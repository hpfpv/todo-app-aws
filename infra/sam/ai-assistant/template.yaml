AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: "Stack for todo-houessou-com ai-assistant service"

Parameters:
  CognitoUserPoolId:
    Type: String
    Description: Cognito User Pool ID for JWT validation

Globals:
  Function:
    Runtime: python3.12
    Tracing: Active
    Tags:
      Project: todo-houessou-com
      Service: ai-assistant
      ManagedBy: SAM

Resources:

  # ── DynamoDB ──────────────────────────────────────────────────────────────

  BotTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "BotTable-${AWS::StackName}"
      BillingMode: PAY_PER_REQUEST
      Tags:
        - Key: Project
          Value: todo-houessou-com
        - Key: Service
          Value: ai-assistant
        - Key: ManagedBy
          Value: SAM
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ── Lambda Functions ──────────────────────────────────────────────────────

  AuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-authorizer"
      CodeUri: ../../../services/ai-assistant/src/authorizer/
      Handler: handler.lambda_handler
      Timeout: 10
      Environment:
        Variables:
          COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
          COGNITO_REGION: !Sub "${AWS::Region}"

  WebSocketHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-websocket-handler"
      CodeUri: ../../../services/ai-assistant/src/websocket_handler/
      Handler: handler.lambda_handler
      Timeout: 30
      Environment:
        Variables:
          BOT_TABLE: !Ref BotTable
          AGENT_ID: !GetAtt TodoAgent.AgentId
          AGENT_ALIAS_ID: !GetAtt TodoAgentAlias.AgentAliasId
          ENABLE_TRACE: "false"
          WS_ENDPOINT: !Sub "https://${ChatbotWebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/production"
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:DeleteItem
              Resource: !GetAtt BotTable.Arn
            - Effect: Allow
              Action: bedrock:InvokeAgent
              Resource: !GetAtt TodoAgentAlias.AgentAliasArn
            - Effect: Allow
              Action: execute-api:ManageConnections
              Resource: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ChatbotWebSocketApi}/production/POST/@connections/*"

  ActionGroupHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-action-group"
      CodeUri: ../../../services/ai-assistant/src/action_group/
      Handler: handler.lambda_handler
      Timeout: 30
      Environment:
        Variables:
          TODO_TABLE: !ImportValue "todo-houessou-com-TodoTable"
          TODO_TABLE_REGION: !Sub "${AWS::Region}"
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Query
                - dynamodb:PutItem
                - dynamodb:UpdateItem
              Resource:
                - !ImportValue "todo-houessou-com-TodoTableArn"
                - !Sub
                  - "${TableArn}/index/*"
                  - TableArn: !ImportValue "todo-houessou-com-TodoTableArn"

  EnableBedrockLoggingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-enable-bedrock-logging"
      CodeUri: ../../../services/ai-assistant/src/enable_bedrock_logging/
      Handler: handler.lambda_handler
      Timeout: 30
      Environment:
        Variables:
          LOGGING_ROLE_ARN: !GetAtt BedrockLoggingRole.Arn
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action: bedrock:PutModelInvocationLoggingConfiguration
              Resource: "*"
            - Effect: Allow
              Action: iam:PassRole
              Resource: !GetAtt BedrockLoggingRole.Arn

  # ── WebSocket API ─────────────────────────────────────────────────────────

  ChatbotWebSocketApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${AWS::StackName}-websocket"
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: "$request.body.action"
      Tags:
        Project: todo-houessou-com
        Service: ai-assistant
        ManagedBy: SAM

  ChatbotAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      ApiId: !Ref ChatbotWebSocketApi
      AuthorizerType: REQUEST
      AuthorizerUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AuthorizerFunction.Arn}/invocations"
      IdentitySource:
        - route.request.querystring.token
      Name: CognitoJwtAuthorizer

  ConnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ChatbotWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WebSocketHandlerFunction.Arn}/invocations"

  DisconnectIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ChatbotWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WebSocketHandlerFunction.Arn}/invocations"

  DefaultIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ChatbotWebSocketApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${WebSocketHandlerFunction.Arn}/invocations"

  ConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ChatbotWebSocketApi
      RouteKey: $connect
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref ChatbotAuthorizer
      Target: !Sub "integrations/${ConnectIntegration}"

  DisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ChatbotWebSocketApi
      RouteKey: $disconnect
      AuthorizationType: NONE
      Target: !Sub "integrations/${DisconnectIntegration}"

  DefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ChatbotWebSocketApi
      RouteKey: $default
      AuthorizationType: NONE
      Target: !Sub "integrations/${DefaultIntegration}"

  ChatbotDeployment:
    Type: AWS::ApiGatewayV2::Deployment
    DependsOn:
      - ConnectRoute
      - DisconnectRoute
      - DefaultRoute
    Properties:
      ApiId: !Ref ChatbotWebSocketApi

  ChatbotStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref ChatbotWebSocketApi
      DeploymentId: !Ref ChatbotDeployment
      StageName: production
      Tags:
        Project: todo-houessou-com
        Service: ai-assistant
        ManagedBy: SAM

  # ── Lambda Permissions ────────────────────────────────────────────────────

  AuthorizerInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt AuthorizerFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ChatbotWebSocketApi}/*"

  WebSocketHandlerInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt WebSocketHandlerFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ChatbotWebSocketApi}/*"

  # ── Bedrock Observability ─────────────────────────────────────────────────

  BedrockInvocationLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/bedrock/model-invocations
      RetentionInDays: 7
      Tags:
        - Key: Project
          Value: todo-houessou-com
        - Key: Service
          Value: ai-assistant
        - Key: ManagedBy
          Value: SAM

  BedrockLoggingRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-bedrock-logging-role"
      Tags:
        - Key: Project
          Value: todo-houessou-com
        - Key: Service
          Value: ai-assistant
        - Key: ManagedBy
          Value: SAM
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockCWLogsPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt BedrockInvocationLogGroup.Arn

  BedrockLoggingCustomResource:
    Type: AWS::CloudFormation::CustomResource
    DependsOn:
      - BedrockInvocationLogGroup
      - BedrockLoggingRole
    Properties:
      ServiceToken: !GetAtt EnableBedrockLoggingFunction.Arn

  EnableBedrockLoggingInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt EnableBedrockLoggingFunction.Arn
      Action: lambda:InvokeFunction
      Principal: cloudformation.amazonaws.com

  # ── Bedrock Agent ─────────────────────────────────────────────────────────

  TodoAgentRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-bedrock-agent-role"
      Tags:
        - Key: Project
          Value: todo-houessou-com
        - Key: Service
          Value: ai-assistant
        - Key: ManagedBy
          Value: SAM
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: bedrock.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockAgentPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: bedrock:InvokeModel
                Resource: !Sub "arn:aws:bedrock:${AWS::Region}::foundation-model/amazon.nova-lite-v1:0"
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt ActionGroupHandlerFunction.Arn

  TodoAgent:
    Type: AWS::Bedrock::Agent
    Properties:
      AgentName: !Sub "${AWS::StackName}-todo-assistant"
      FoundationModel: amazon.nova-lite-v1:0
      AgentResourceRoleArn: !GetAtt TodoAgentRole.Arn
      AutoPrepare: true
      Instruction: |
        You are a helpful assistant for a todo list application called TodoHouessou.
        The user's ID is provided at the start of each message in the format <userid>USER_ID</userid>.
        Always extract and use this userID when calling API actions.
        You can help users: list their todos, view a specific todo, create new todos, mark todos as complete, and add notes to todos.
        When referring to todos, use natural language. Never expose internal IDs unless the user asks.
        Always respond concisely and in a friendly tone.
      ActionGroups:
        - ActionGroupName: TodoActions
          Description: Actions for reading and managing the user's todos
          ActionGroupExecutor:
            Lambda: !GetAtt ActionGroupHandlerFunction.Arn
          FunctionSchema:
            Functions:
              - Name: getTodos
                Description: Get all todos for a user
                Parameters:
                  userID:
                    Type: string
                    Description: The user's ID
                    Required: true
              - Name: getTodo
                Description: Get a specific todo by ID
                Parameters:
                  userID:
                    Type: string
                    Description: The user's ID
                    Required: true
                  todoID:
                    Type: string
                    Description: The todo's ID
                    Required: true
              - Name: addTodo
                Description: Create a new todo
                Parameters:
                  userID:
                    Type: string
                    Description: The user's ID
                    Required: true
                  title:
                    Type: string
                    Description: Title of the todo
                    Required: true
                  description:
                    Type: string
                    Description: Description of the todo
                    Required: true
                  dateDue:
                    Type: string
                    Description: Due date in YYYY-MM-DD format
                    Required: true
              - Name: addTodoNotes
                Description: Add or update notes on a todo
                Parameters:
                  userID:
                    Type: string
                    Description: The user's ID
                    Required: true
                  todoID:
                    Type: string
                    Description: The todo's ID
                    Required: true
                  notes:
                    Type: string
                    Description: Notes to add to the todo
                    Required: true
              - Name: completeTodo
                Description: Mark a todo as complete
                Parameters:
                  userID:
                    Type: string
                    Description: The user's ID
                    Required: true
                  todoID:
                    Type: string
                    Description: The todo's ID
                    Required: true
      Tags:
        Project: todo-houessou-com
        Service: ai-assistant
        ManagedBy: SAM

  TodoAgentAlias:
    Type: AWS::Bedrock::AgentAlias
    Properties:
      AgentId: !GetAtt TodoAgent.AgentId
      AgentAliasName: !Sub "${AWS::StackName}-alias"
      Tags:
        Project: todo-houessou-com
        Service: ai-assistant
        ManagedBy: SAM

  ActionGroupLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt ActionGroupHandlerFunction.Arn
      Action: lambda:InvokeFunction
      Principal: bedrock.amazonaws.com
      SourceArn: !GetAtt TodoAgent.AgentArn

  # ── SSM Parameters ────────────────────────────────────────────────────────

  SsmWebSocketEndpoint:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /todo-houessou-com/ai-assistant/websocket-endpoint
      Type: String
      Value: !Sub "wss://${ChatbotWebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/production"

  # ── Outputs ───────────────────────────────────────────────────────────────

Outputs:
  WebSocketEndpoint:
    Description: "WebSocket API endpoint — use as VITE_CHATBOT_WS_ENDPOINT"
    Value: !Sub "wss://${ChatbotWebSocketApi}.execute-api.${AWS::Region}.amazonaws.com/production"
    Export:
      Name: !Sub "${AWS::StackName}-WebSocketEndpoint"
  ActionGroupFunctionArn:
    Description: "ARN of the action group Lambda function"
    Value: !GetAtt ActionGroupHandlerFunction.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ActionGroupFunctionArn"
  AgentId:
    Description: "Bedrock Agent ID"
    Value: !GetAtt TodoAgent.AgentId
    Export:
      Name: !Sub "${AWS::StackName}-AgentId"
  AgentAliasId:
    Description: "Bedrock Agent Alias ID"
    Value: !GetAtt TodoAgentAlias.AgentAliasId
    Export:
      Name: !Sub "${AWS::StackName}-AgentAliasId"
