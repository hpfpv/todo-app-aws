name: sam-deploy-attachments-service

on:
  push:
    branches: [main]
    paths:
      - 'services/attachments-service/**'
      - 'infra/sam/attachments-service/**'
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4

      - uses: aws-actions/setup-sam@v2

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: sam build
        working-directory: ./infra/sam/attachments-service
        run: sam build

      - name: sam deploy
        working-directory: ./infra/sam/attachments-service
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --stack-name ${{ secrets.FILES_STACK_NAME }} \
            --s3-bucket ${{ secrets.SAM_S3_BUCKET }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --region ${{ secrets.AWS_REGION }}

      - name: Extract stack outputs and update frontend secrets
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name ${{ secrets.FILES_STACK_NAME }} \
            --region ${{ secrets.AWS_REGION }} \
            --query 'Stacks[0].Outputs' \
            --output json --no-cli-pager)

          FILES_API=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="FilesApi") | .OutputValue')
          IDENTITY_POOL=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="TodoIdentityPoolId") | .OutputValue')
          S3_BUCKET=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="TodoFilesBucket") | .OutputValue')

          gh secret set VITE_FILES_API_ENDPOINT --body "$FILES_API" --repo ${{ github.repository }}
          gh secret set VITE_COGNITO_IDENTITY_POOL_ID --body "$IDENTITY_POOL" --repo ${{ github.repository }}
          gh secret set VITE_S3_BUCKET --body "$S3_BUCKET" --repo ${{ github.repository }}
          gh secret set VITE_AWS_REGION --body "${{ secrets.AWS_REGION }}" --repo ${{ github.repository }}
