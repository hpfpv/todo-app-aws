name: sam-deploy-attachments-service

on:
  push:
    branches: [main]
    paths:
      - 'services/attachments-service/**'
      - 'infra/sam/attachments-service/**'
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4

      - uses: aws-actions/setup-sam@v2

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Read stack name from config
        run: |
          STACK_NAME=$(jq -r '.attachmentsServiceStackName' infra/sam/config.json)
          echo "STACK_NAME=$STACK_NAME" >> $GITHUB_ENV

      - name: sam build
        working-directory: ./infra/sam/attachments-service
        run: sam build

      - name: sam deploy
        working-directory: ./infra/sam/attachments-service
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --stack-name $STACK_NAME \
            --resolve-s3 \
            --capabilities CAPABILITY_NAMED_IAM \
            --region ${{ secrets.AWS_REGION }}
