name: sam-deploy-main-service

on:
  push:
    branches: [main]
    paths:
      - 'services/main-service/**'
      - 'infra/sam/main-service/**'
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4

      - uses: aws-actions/setup-sam@v2

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: sam build
        working-directory: ./infra/sam/main-service
        run: sam build

      - name: sam deploy
        working-directory: ./infra/sam/main-service
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --stack-name ${{ secrets.MAIN_STACK_NAME }} \
            --s3-bucket ${{ secrets.SAM_S3_BUCKET }} \
            --capabilities CAPABILITY_NAMED_IAM \
            --region ${{ secrets.AWS_REGION }}

      - name: Write outputs to SSM
        run: |
          OUTPUTS=$(aws cloudformation describe-stacks \
            --stack-name ${{ secrets.MAIN_STACK_NAME }} \
            --region us-east-1 \
            --query 'Stacks[0].Outputs' \
            --output json)

          TODO_API=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="MainHttpApi") | .OutputValue')
          USER_POOL=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="TodoUserPool") | .OutputValue')
          USER_POOL_CLIENT=$(echo "$OUTPUTS" | jq -r '.[] | select(.OutputKey=="TodoUserPoolClient") | .OutputValue')

          aws ssm put-parameter \
            --name "/todo-houessou-com/main-service/api-url" \
            --value "$TODO_API" \
            --type String \
            --overwrite \
            --region us-east-1

          aws ssm put-parameter \
            --name "/todo-houessou-com/main-service/cognito-user-pool-id" \
            --value "$USER_POOL" \
            --type String \
            --overwrite \
            --region us-east-1

          aws ssm put-parameter \
            --name "/todo-houessou-com/main-service/cognito-client-id" \
            --value "$USER_POOL_CLIENT" \
            --type String \
            --overwrite \
            --region us-east-1
