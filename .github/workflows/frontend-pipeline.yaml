name: deploy-frontend

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install dependencies
        working-directory: ./apps/web
        run: npm ci

      - name: Build
        working-directory: ./apps/web
        run: npm run build
        env:
          VITE_TODO_API_ENDPOINT: ${{ secrets.VITE_TODO_API_ENDPOINT }}
          VITE_FILES_API_ENDPOINT: ${{ secrets.VITE_FILES_API_ENDPOINT }}
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.VITE_COGNITO_CLIENT_ID }}
          VITE_COGNITO_IDENTITY_POOL_ID: ${{ secrets.VITE_COGNITO_IDENTITY_POOL_ID }}
          VITE_S3_BUCKET: ${{ secrets.VITE_S3_BUCKET }}
          VITE_AWS_REGION: ${{ secrets.AWS_REGION }}
          VITE_CHATBOT_WS_ENDPOINT: ${{ secrets.VITE_CHATBOT_WS_ENDPOINT }}

      - name: Deploy to S3
        run: |
          aws s3 sync apps/web/dist s3://${{ secrets.AWS_S3_BUCKET }} \
            --delete \
            --follow-symlinks \
            --no-cli-pager

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CFDISTRIBUTION }} \
            --paths "/*" \
            --no-cli-pager
