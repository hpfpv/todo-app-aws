name: sam-deploy-ai-assistant-service

on:
  push:
    branches: [main]
    paths:
      - 'services/ai-assistant/**'
      - 'infra/sam/ai-assistant/**'
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4

      - uses: aws-actions/setup-sam@v2

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: sam build
        working-directory: ./infra/sam/ai-assistant
        run: sam build

      - name: Read Cognito User Pool ID from SSM
        run: |
          COGNITO_USER_POOL_ID=$(aws ssm get-parameter \
            --name "/todo-houessou-com/main-service/cognito-user-pool-id" \
            --query Parameter.Value \
            --output text \
            --region us-east-1)
          echo "COGNITO_USER_POOL_ID=$COGNITO_USER_POOL_ID" >> $GITHUB_ENV

      - name: sam deploy
        working-directory: ./infra/sam/ai-assistant
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --stack-name todo-houessou-com-ai-assistant \
            --s3-bucket ${{ secrets.SAM_S3_BUCKET }} \
            --region us-east-1 \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --parameter-overrides CognitoUserPoolId=${{ env.COGNITO_USER_POOL_ID }}

      - name: Write outputs to SSM
        run: |
          WS_ENDPOINT=$(aws cloudformation describe-stacks \
            --stack-name todo-houessou-com-ai-assistant \
            --region us-east-1 \
            --query 'Stacks[0].Outputs[?OutputKey==`WebSocketEndpoint`].OutputValue' \
            --output text)

          aws ssm put-parameter \
            --name "/todo-houessou-com/ai-assistant/websocket-endpoint" \
            --value "$WS_ENDPOINT" \
            --type String \
            --overwrite \
            --region us-east-1
