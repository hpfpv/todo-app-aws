name: sam-deploy-ai-assistant-service

on:
  push:
    branches: [main]
    paths:
      - 'services/ai-assistant/**'
      - 'infra/sam/ai-assistant/**'
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4

      - uses: aws-actions/setup-sam@v2

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Read config
        run: |
          STACK_NAME=$(jq -r '.aiAssistantStackName' infra/sam/config.json)
          echo "STACK_NAME=$STACK_NAME" >> $GITHUB_ENV

          COGNITO_USER_POOL_ID=$(aws ssm get-parameter \
            --name "/todo-houessou-com/main-service/cognito-user-pool-id" \
            --query Parameter.Value \
            --output text \
            --region ${{ secrets.AWS_REGION }})
          echo "COGNITO_USER_POOL_ID=$COGNITO_USER_POOL_ID" >> $GITHUB_ENV

      - name: sam build
        working-directory: ./infra/sam/ai-assistant
        run: sam build

      - name: sam deploy
        working-directory: ./infra/sam/ai-assistant
        run: |
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --stack-name $STACK_NAME \
            --region ${{ secrets.AWS_REGION }} \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --parameter-overrides CognitoUserPoolId=$COGNITO_USER_POOL_ID
