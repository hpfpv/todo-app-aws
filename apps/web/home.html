<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Home - TodoHouessou</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.1/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="favicon.png">
</head>
<body id="body">

    <!-- Navbar -->
    <nav class="site-navbar">
        <a href="#" class="navbar-logo">
            <img src="img/logo.png" alt="Logo" style="height:36px;width:auto;">
        </a>
        <div class="navbar-search">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" id="searchTodosFilter" placeholder="Search todos…">
        </div>
        <div class="navbar-actions">
            <button type="button" id="addTodoButton" class="btn-primary-nav" data-toggle="modal" data-target="#newTodoModal">+ New todo</button>
            <button type="button" id="signOutButton" class="btn-outline-nav">Sign out</button>
        </div>
    </nav>

    <!-- Stats bar -->
    <div class="stats-bar">
        <div class="stat-pill">
            <span class="stat-count" id="statTotal" style="color:var(--teal)">0</span>
            <span class="stat-label">TOTAL</span>
        </div>
        <div class="stat-pill">
            <span class="stat-count" id="statInProgress" style="color:var(--amber)">0</span>
            <span class="stat-label">IN PROGRESS</span>
        </div>
        <div class="stat-pill">
            <span class="stat-count" id="statDone" style="color:var(--green)">0</span>
            <span class="stat-label">DONE</span>
        </div>
    </div>

    <!-- Chat FAB -->
    <button id="chatFab" class="chat-fab" aria-label="Open assistant">✦</button>

    <!-- Chat Drawer -->
    <div id="chatDrawer" class="chat-drawer">
        <div class="drawer-handle"></div>
        <div class="drawer-header">
            <div class="drawer-avatar">✦</div>
            <div class="drawer-identity">
                <strong>Assistant</strong>
                <span class="drawer-status">● Offline</span>
            </div>
            <button id="chatCloseBtn" class="drawer-close" aria-label="Close">✕</button>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-row">
            <input type="text" id="userInput" placeholder="Type a message…" class="chat-pill-input">
            <button id="sendMessageButton" class="chat-send-btn">➤</button>
        </div>
    </div>

    <!-- Todos list -->
    <div class="container">
        <div id="todosList" class="row"></div>
    </div>

    <!-- Description Modal -->
    <div class="modal fade" id="descriptionModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-scrollable">
            <div class="modal-content todo-modal-content">
                <div class="modal-header todo-modal-header">
                    <h5 class="todo-modal-title" id="descriptionTitle">Loading…</h5>
                    <button type="button" class="todo-modal-close" data-dismiss="modal" aria-label="Close">✕</button>
                </div>
                <div class="modal-body todo-modal-body">
                    <div class="todo-modal-field">
                        <span class="todo-modal-label">Description</span>
                        <span class="todo-modal-value" id="descriptionDescription"></span>
                    </div>
                    <div class="todo-modal-row">
                        <div class="todo-modal-field">
                            <span class="todo-modal-label">Due Date</span>
                            <span class="todo-modal-value" id="descriptionDateDue"></span>
                        </div>
                        <div class="todo-modal-field">
                            <span class="todo-modal-label">Created</span>
                            <span class="todo-modal-value" id="descriptionDateCreated"></span>
                        </div>
                    </div>
                    <div class="todo-modal-field">
                        <span class="todo-modal-label">Notes</span>
                        <textarea class="todo-modal-notes form-control" id="descriptionNotes" placeholder="Add notes…"></textarea>
                    </div>
                    <div class="todo-modal-field">
                        <span class="todo-modal-label">Attachments</span>
                        <div id="filesList" class="todo-modal-files"></div>
                    </div>
                    <div class="d-none" id="addFilesForm">
                        <div class="input-group upload-form mt-2">
                            <div class="input-group-prepend">
                                <span type="button" class="btn btn-custom" id="uploadButton">Upload</span>
                            </div>
                            <div class="custom-file">
                                <input type="file" class="form-control-file" id="fileinput">
                                <label class="custom-file-label" for="fileinput" id="fileName">Choose File</label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer todo-modal-footer">
                    <button id="saveNotesButton" type="button" class="todo-modal-btn btn-modal-save">Save notes</button>
                    <button id="showAddFilesButton" type="button" class="todo-modal-btn btn-modal-secondary">+ Attachment</button>
                    <button id="completedButton" type="button" class="todo-modal-btn btn-modal-complete">Mark complete</button>
                    <button id="alreadyCompletedButton" type="button" class="todo-modal-btn btn-modal-done d-none" disabled>✓ Done</button>
                    <button id="deleteTodoButton" type="button" class="todo-modal-btn btn-modal-delete">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <!-- New Todo Modal -->
    <div class="modal fade" id="newTodoModal" tabindex="-1" role="dialog" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content todo-modal-content">
                <div class="modal-header todo-modal-header">
                    <h5 class="todo-modal-title">+ New todo</h5>
                    <button type="button" class="todo-modal-close" data-dismiss="modal" aria-label="Close">✕</button>
                </div>
                <div class="modal-body todo-modal-body">
                    <form id="newTodoForm">
                        <div class="todo-modal-field">
                            <span class="todo-modal-label">Title</span>
                            <input type="text" class="todo-modal-input" id="newTodoModalTitle" name="newTodoModalTitle" placeholder="What needs to be done?" required />
                        </div>
                        <div class="todo-modal-field">
                            <span class="todo-modal-label">Due date</span>
                            <input type="date" class="todo-modal-input" id="newTodoModalDateDue" name="newTodoModalDateDue" min="2021-01-01"/>
                        </div>
                        <div class="todo-modal-field">
                            <span class="todo-modal-label">Description</span>
                            <textarea class="todo-modal-notes" id="newTodoModalDescription" placeholder="Add a description…"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer todo-modal-footer">
                    <button type="submit" form="newTodoForm" id="newTodo-modal-button" class="todo-modal-btn btn-modal-save">Add todo</button>
                    <button type="button" class="todo-modal-btn btn-modal-secondary" data-dismiss="modal">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <p><br><br>&nbsp;&nbsp;This site is a sample todo-list app created for training purposes.</p>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.1/js/bootstrap.min.js"></script>
    <script type="module" src="/src/pages/home.ts"></script>
</body>
</html>
