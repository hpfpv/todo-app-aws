<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Register - TodoHouessou</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="favicon.png">
</head>
<body>
    <div class="container-fluid" style="text-align: center">
        <a class="navbar-brand" href="#">
            <img src="img/logo.png" id="logo" align="center"/>
        </a>
    </div>

    <div class="container">
        <div class="row">
            <div class="col-md-4 offset-md-4">
                <h2 class="text-center signin-title">Register</h2>
                <form id="userDetails">
                    <div class="form-group input-field">
                        <label for="email">Email</label>
                        <input type="email" class="form-control rounded-0" name="email" id="email" placeholder="Your email">
                    </div>
                    <div class="form-group input-field">
                        <label for="pwd">Password</label>
                        <input type="password" class="form-control rounded-0" name="pwd" id="pwd" placeholder="Your password">
                    </div>
                    <div class="form-group input-field">
                        <label for="confirmPwd">Confirm Password</label>
                        <input type="password" class="form-control rounded-0" name="confirmPwd" id="confirmPwd" placeholder="Confirm password">
                    </div>
                    <button type="submit" class="btn btn-custom signin">Register</button>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="/src/pages/register.ts"></script>
</body>
</html>
